on: 
  push: 
    branches: 
      - main

jobs: 
  build_and_deploy: 
    runs-on: ubuntu-latest
    steps: 
      - name: Build and Deploy
        env: 
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with: 
          node-version: '23'
      - run: npm install -g wrangler
      - run: npm ci
      - run: npm run build
